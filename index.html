<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香港公司水牌 - GitHub 静态资源版</title>
<style>

        /* 本地字体资源：GitHub Pages / 静态站点可直接加载 */
        @font-face {
            font-family: "Poppins";
            src: url("./assets/fonts/Poppins-Regular.ttf") format("truetype");
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: "Poppins";
            src: url("./assets/fonts/Poppins-Bold.ttf") format("truetype");
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: "Noto Sans SC";
            src: url("./assets/fonts/NotoSansSC-Regular.ttf") format("truetype");
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: "Noto Sans SC";
            src: url("./assets/fonts/NotoSansSC-Bold.ttf") format("truetype");
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: "Noto Sans TC";
            src: url("./assets/fonts/NotoSansTC-Regular.ttf") format("truetype");
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: "Noto Sans TC";
            src: url("./assets/fonts/NotoSansTC-Bold.ttf") format("truetype");
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }






:root {
            --accent: #ff6413;
            --line: #f2c49f;
            --text: #111111;
            --frame: #262626;
            --bg: #fbfbfb;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
        }

        body {
            background: #ffffff;
            font-family: "Poppins", "Noto Sans TC", "Noto Sans SC", sans-serif;
            color: var(--text);
            text-rendering: geometricPrecision;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .board {
            position: relative;
            width: 100vw;
            height: 100vh;
            min-width: 960px;
            min-height: 540px;
            overflow: hidden;
            background: var(--bg);
            border: 4px solid var(--frame);
            padding: 36px 36px 28px 36px;
        }

        .corner-top {
            position: absolute;
            top: 0;
            right: 0;
            width: 124px;
            height: 75px;
            background: var(--accent);
        }

        .corner-side {
            position: absolute;
            top: 75px;
            right: 0;
            width: 74px;
            height: 53px;
            background: var(--accent);
        }

        .logo-wrap {
            height: 92px;
            display: flex;
            align-items: flex-start;
        }

        .logo-block {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            line-height: 1;
        }

        .logo {
            width: auto;
            height: 88px;
            max-width: 260px;
            object-fit: contain;
            display: block;
        }
.top-rule {
            width: 100%;
            height: 1px;
            background: var(--line);
            margin-top: 4px;
        }

        .table-wrap {
            width: 100%;
        }

        .header-row,
        .company-row {
            display: grid;
            grid-template-columns: 50% 50%;
            align-items: center;
            width: 100%;
        }

        .header-row {
            height: 44px;
            color: var(--accent);
            font-weight: 700;
            font-size: 18px;
            border-bottom: 1px solid var(--line);
        }

        .company-row {
            height: clamp(40px, 6.15vh, 45px);
            border-bottom: 1px solid var(--line);
            font-size: clamp(17px, 1.55vw, 19px);
            letter-spacing: 0.1px;
        }

        .header-cell,
        .company-cell {
            min-width: 0;
            padding: 0 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .header-cell:first-child,
        .company-cell:first-child {
            padding-left: 10px;
        }

        .header-cell:last-child,
        .company-cell:last-child {
            padding-left: 10px;
        }

        .empty-state {
            display: none;
            margin-top: 18px;
            padding: 16px;
            border: 1px solid var(--line);
            color: #b33a00;
            font-size: 18px;
            background: #fff7f1;
        }

        .footer-note {
            position: absolute;
            left: 46px;
            bottom: 18px;
            font-size: 12px;
            color: #888;
            opacity: 0;
            pointer-events: none;
        }

        @media (max-width: 1100px) {
            .board {
                min-width: 0;
                padding: 30px 28px 22px 28px;
            }

            .logo {
                width: 260px;
                height: auto;
            }
.logo-wrap {
                height: 92px;
            }

            .corner-top {
                width: 108px;
                height: 66px;
            }

            .corner-side {
                top: 66px;
                width: 66px;
                height: 48px;
            }

            .header-row {
                font-size: 17px;
            }
        }

        /* 字体分层：英文 Poppins，繁体 Noto Sans TC，简体 Noto Sans SC；字体均已 Base64 离线内嵌 */
        .font-en {
            font-family: "Poppins", Arial, sans-serif;
            font-weight: 400;
        }

        .font-zh-tc {
            font-family: "Noto Sans TC", "Noto Sans SC", sans-serif;
            font-weight: 400;
        }

        .font-zh-sc {
            font-family: "Noto Sans SC", "Noto Sans TC", sans-serif;
            font-weight: 400;
        }

        .header-row .font-en,
        .header-row .font-zh-sc,
        .header-row .font-zh-tc {
            font-weight: 700;
        }

    </style>
</head>
<body>
    <main class="board">
        <div class="corner-top" aria-hidden="true"></div>
        <div class="corner-side" aria-hidden="true"></div>

        <div class="logo-wrap">
            <div class="logo-block" aria-label="Ascentium 与 In.Corp 彦德国际">
                <img class="logo" alt="Ascentium | In.Corp 彦德国际" src="./assets/images/incorp-logo.png">
            </div>
        </div>

        <div class="top-rule"></div>

        <section class="table-wrap" aria-label="公司名单">
            <div class="header-row">
                <div class="header-cell font-en" lang="en">List of Companies</div>
                <div class="header-cell font-zh-sc" lang="zh-Hans">公司名单</div>
            </div>

            <div id="company-rows"></div>
            <div id="empty-state" class="empty-state">未检测到 companies 数据，请确认 data.js 已正确生成并加载。</div>
        </section>

        <div class="footer-note">Auto-generated signboard</div>
    </main>

    <script src="./data.js" onerror="window.__dataLoadFailed = true;"></script>
    <script>
        const VISIBLE_ROWS = 10;
        const ROTATE_INTERVAL = 4000;
        let currentIndex = 0;
        let timer = null;

        const rowsContainer = document.getElementById('company-rows');
        const emptyState = document.getElementById('empty-state');

        function getCompanyText(item, key) {
            if (!item || typeof item !== 'object') return '';
            const value = item[key];
            return value == null ? '' : String(value).trim();
        }

        // 公司名单以香港公司为主，默认按繁体展示；
        // 若文本出现较明显的简体特征字，则切换到 Noto Sans SC。
        function getChineseFontMeta(text) {
            const value = String(text || '');
            const simplifiedHints = /[国际资发东业门广华台万与专务体开关术证]|名单/;
            const traditionalHints = /[國際資發東業門廣華臺萬與專務體開關術證]|名單/;

            if (simplifiedHints.test(value) && !traditionalHints.test(value)) {
                return { className: 'font-zh-sc', lang: 'zh-Hans' };
            }

            return { className: 'font-zh-tc', lang: 'zh-Hant' };
        }

        function createRow(company) {
            const row = document.createElement('div');
            row.className = 'company-row';

            const enCell = document.createElement('div');
            enCell.className = 'company-cell font-en';
            enCell.lang = 'en';
            enCell.textContent = getCompanyText(company, '公司英文名称');

            const cnCell = document.createElement('div');
            const cnText = getCompanyText(company, '公司中文名称');
            const cnMeta = getChineseFontMeta(cnText);
            cnCell.className = `company-cell ${cnMeta.className}`;
            cnCell.lang = cnMeta.lang;
            cnCell.textContent = cnText;

            row.appendChild(enCell);
            row.appendChild(cnCell);
            return row;
        }

        function renderRows() {
            const data = Array.isArray(window.companies) ? window.companies : [];
            rowsContainer.innerHTML = '';

            if (!data.length) {
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';

            const count = Math.min(VISIBLE_ROWS, data.length);
            for (let i = 0; i < count; i++) {
                const index = (currentIndex + i) % data.length;
                rowsContainer.appendChild(createRow(data[index]));
            }

            for (let i = count; i < VISIBLE_ROWS; i++) {
                rowsContainer.appendChild(createRow({}));
            }
        }

        function startRotation() {
            const data = Array.isArray(window.companies) ? window.companies : [];
            if (timer) clearInterval(timer);
            if (data.length <= VISIBLE_ROWS) return;

            timer = setInterval(() => {
                currentIndex = (currentIndex + 1) % data.length;
                renderRows();
            }, ROTATE_INTERVAL);
        }

        window.addEventListener('load', () => {
            renderRows();
            startRotation();
        });
    </script>
</body>
</html>
